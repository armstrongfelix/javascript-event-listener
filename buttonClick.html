<!-- ### Exercise 1 — Button Click Counter

Create a button and a paragraph. Every time the button is clicked, a counter should increase and display: `"You have clicked 3 times"`.

**Hint:** Use `addEventListener("click", ...)` and a variable to track the count. -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="m-[auto] p-0 bg-gray-100 h-screen flex flex-col gap-20 items-center justify-center"
  >
    <h1>JAVASCRIPT EVENT LISTENERS</h1>
    <div
      class="w-[80vw] h-1/2 bg-red-200 flex p-4 gap-10 items-center rounded-md shadow-md"
    >
      <button
        id="clickMe"
        class="w-fit h-fit p-4 rounded-md bg-blue-500 text-white font-semibold hover:bg-blue-700 active:bg-blue-950 transition-colors duration-300"
      >
        ADD COUNT
      </button>
      <p
        id="displayResult"
        class="w-[60%] h-[30%] bg-[white] p-4 text-center font-semibold text-4xl rounded-md"
      ></p>
    </div>
  </body>
  <script>
    const clickMeButton = document.getElementById("clickMe");
    const display = document.getElementById("displayResult");

    let counter = 0;

    clickMeButton.addEventListener("click", () => {
      counter++;
      display.textContent = `You have Clicked Me ${counter}`;
    });
  </script>
</html>
